name: Build and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}

jobs:
  sequoia-publish:
    runs-on: ubuntu-latest
    name: Sequoia Publish
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10

      - name: Install sequoia
        run: pnpm install -g sequoia-cli

      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh/install.sh | sh

      - name: Publish to ATProto
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            dotenvx run -f .env -- sequoia publish --dry-run
          else 
            dotenvx run -f .env -- sequoia publish
          fi

      - name: Check for ATProto Changes
        id: check_changes
        run: |
          if ! git diff --quiet; then
            echo "Changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push ATProto Changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # configure user
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          # stage any file changes to be committed
          git add .

          # make commit with staged changes
          git commit -m 'chore(atproto): commit atproto publishing updates'

          # push the commit back up to source GitHub repository
          git push

      - name: Upload updated content
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: site-content
          path: |
            site/content

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [sequoia-publish]
    env:
      HUGO_VERSION: "0.163.1"
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Download updated content
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v8
        with:
          name: site-content
          path: site/content

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ${{ env.HUGO_CACHEDIR }}
            resources/_gen/images
          key: ${{ runner.os }}-hugobuild-${{ env.HUGO_VERSION }}-${{github.head_ref || github.ref_name}}-${{ hashFiles('**/go.sum','site/assets') }}
          restore-keys: |
            ${{ runner.os }}-hugobuild-${{ env.HUGO_VERSION }}-${{github.head_ref || github.ref_name}}

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            hugo -D --environment=development
          else
            hugo --minify --environment=production
          fi
        working-directory: ./site

      - name: Archive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hugo-build
          path: |
            site/public
          if-no-files-found: error
          include-hidden-files: true

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      WRANGLER_VERSION: "3.78.10"
    needs: [build, gitleaks]
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hugo-build
          path: public

      - name: Cache wrangler install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.npm
            ./node_modules
          key: ${{ runner.os }}-wrangler-${{ env.WRANGLER_VERSION }}-${{github.head_ref || github.ref_name}}
          restore-keys: |
            ${{ runner.os }}-wrangler-${{ env.WRANGLER_VERSION }}

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          command: |
            pages deploy public --project-name=bckr-me --branch ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Comment PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3
        with:
          comment-tag: deployment
          message: |
            PR deployed to ${{ steps.deploy.outputs.deployment-alias-url }} ! :rocket:
